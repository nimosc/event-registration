services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: event-registration:latest
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
